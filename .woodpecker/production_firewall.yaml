---
when:
  - path:
      include:
        - 'stages/firewall/**'
        - '.woodpecker/production_firewall.yaml'
    event: push
labels:
  role: production
skip_clone: true
steps:
  clone:
    image: bash
    commands:
      - git clone --depth=1 ${CI_REPO_CLONE_SSH_URL}
  build:
    image: bash
    commands:
      - cd ${CI_REPO_NAME} && echo $GIT_SUDO | sudo -S make firewall
    environment:
      GIT_SUDO:
        from_secret: git_sudo
