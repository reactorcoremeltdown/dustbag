---
when:
  - path:
      include:
        - 'stages/services/includes/monitoring/templates/nginx/sites/gotify.sh'
        - 'stages/services/includes/monitoring/monitoring.mk'
        - '.woodpecker/outpost_gotify.yaml'
    event: push
labels:
  role: outpost
skip_clone: true
steps:
  clone:
    image: bash
    commands:
      - git clone --depth=1 ${CI_REPO_CLONE_SSH_URL}
  build:
    image: bash
    commands:
      - cd ${CI_REPO_NAME} && echo $GIT_SUDO | sudo -S make gotify
    environment:
      GIT_SUDO:
        from_secret: git_sudo
