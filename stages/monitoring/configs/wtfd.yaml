---
kind: "iac.rcmd.space/package"
id: "early.core_packages"
package:
  - name: "dafuq"
---
kind: "iac.rcmd.space/file"
id: "monitoring.wtfd.files"
file:
  - name: "/var/www/healthchecks"
    mode: "755"
    ownership: "root:root"
    source: "directory"
  - name: "/etc/monitoring/configs"
    mode: "755"
    ownership: "root:root"
    source: "directory"
  - name: "/etc/monitoring/plugins"
    mode: "755"
    ownership: "root:root"
    source: "directory"
  - name: "/etc/monitoring/notifiers"
    mode: "755"
    ownership: "root:root"
    source: "directory"
  - name: "/usr/local/bin/wtf"
    mode: "755"
    ownership: "root:root"
    source: "stages/monitoring/files/bin/wtf"
  - name: "/etc/monitoring/config.ini"
    mode: "644"
    ownership: "root:root"
    source: "stages/monitoring/files/configs/config.ini"
  - name: "/etc/monitoring/plugins"
    mode: "755"
    ownership: "root:root"
    source: "stages/monitoring/files/plugins"
  - name: "/etc/monitoring/notifiers"
    mode: "755"
    ownership: "root:root"
    source: "stages/monitoring/files/handlers"
---
kind: "iac.rcmd.space/command"
id: "monitoring.wtfd.restart"
command:
  - createCommand: "systemctl reset-failed wtfd.service && systemctl enable wtfd.service && systemctl restart wtfd.service"
    deleteCommand: "/bin/true"
