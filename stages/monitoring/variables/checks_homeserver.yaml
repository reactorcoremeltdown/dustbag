items:
  - name: dave_service
    plugin: check_systemd_service
    option: dave.service
    interval: 1m
    description: DAVE, a WebDAV server
    hostname: garage.rcmd.space
    notify:
      - gotify
      - alert_fatigue
  - name: snapraid_parity
    plugin: check_file
    option: /mnt/snapraid/parity1/snapraid.parity
    interval: 15s
    description: Snapraid parity
    notify:
      - gotify
      - alert_fatigue
  - name: snapraid_content
    plugin: check_file
    option: /mnt/snapraid/data1/.snapraid.content
    interval: 15s
    description: Snapraid content
    notify:
      - gotify
      - alert_fatigue
  - name: fermium_provisioning
    plugin: check_device_provisioning
    option: ""
    interval: 5m
    description: Checking provisioning status of Fermium
    notify:
      - dummy
  - name: ft_motion
    plugin: check_feature_toggle
    option: motion
    interval: 20s
    description: Feature toggle for motion service
    hostname: fermium.rcmd.space
    notify:
      - feature_toggle
  - name: home_stereo
    plugin: check_mpd_online
    option: ""
    interval: 5m
    description: MPD server online test
    hostname: fermium-wg.tiredsysadmin.cc
    notify:
      - dummy
  - name: home_syncthing
    plugin: check_http_success_rate
    warningThreshold: "99"
    criticalThreshold: "97"
    flowOperator: downwards
    option: http://192.168.2.227:8384/rest/noauth/health
    interval: 62s
    description: Syncthing at home
    hostname: fermium-wg.tiredsysadmin.cc
    notify:
      - dummy
  - name: podsync_service
    plugin: check_systemd_service
    option: podsync.service
    interval: 1m
    description: Podcast sync service
    hostname: fermium-wg.tiredsysadmin.cc
    notify:
      - telegram
      - gotify
      - alert_fatigue
  - name: home_storage
    plugin: check_disk_space
    option: /
    interval: 3m
    description: Free space on disk
    warningThreshold: "90"
    criticalThreshold: "95"
    flowOperator: upwards
    hostname: fermium-wg.tiredsysadmin.cc
    notify:
      - dummy
  - name: nfs_storage
    plugin: check_disk_space
    option: /mnt/pool
    interval: 3m
    description: Free space on NFS
    warningThreshold: "90"
    criticalThreshold: "95"
    flowOperator: upwards
    hostname: fermium-wg.tiredsysadmin.cc
    notify:
      - dummy
  - name: home_printer
    plugin: relay
    option: http://printer.tiredsysadmin.cc:8881?check=home_printer
    interval: 10m
    timeoutSec: 240
    description: '[relay] CUPS server online test'
    notify:
      - dummy
  - name: home_printer_device
    plugin: relay
    option: http://printer.tiredsysadmin.cc:8881?check=home_printer_device
    interval: 5m
    timeoutSec: 240
    description: '[relay] Checking printer status, Brother Industries, Ltd HL-2140 series'
    notify:
      - dummy
  - name: home_wireguard_network
    plugin: check_http_success_rate
    warningThreshold: "96"
    criticalThreshold: "93"
    flowOperator: downwards
    option: http://10.200.1.1:8881
    interval: 182s
    timeoutSec: 120
    description: Wireguard VPN Network
    hostname: fermium-wg.tiredsysadmin.cc
    notify:
      - gotify
      - telegram
      - alert_fatigue
  - name: main_website
    plugin: check_http_success_rate
    warningThreshold: "98"
    criticalThreshold: "97"
    flowOperator: downwards
    option: https://rcmd.space
    interval: 63s
    description: RCMD.space website
    hostname: fermium-wg.tiredsysadmin.cc
    notify:
      - gotify
      - alert_fatigue
  - name: iacd
    plugin: check_systemd_service
    option: iacd.service
    interval: 1m
    description: 'IACD: production (systemd service)'
    timeoutSec: 120
    notify:
      - telegram
      - alert_fatigue
