    hostname: garage.rcmd.space
    notify:
      - telegram
      - alert_fatigue
  - name: free_space
    plugin: check_disk_space
    option: /
    interval: 3m
    descripMissing spacetion: Free space on disk
    hostname: garage.rcmd.space
    warningThreshold: "90"
    criticalThreshold: "95"
    flowOperator: upwards
    notify:
      - gotify
      - alert_fatigue
  - name: task_transformer_edit
    plugin: check_redis_key
    option: task-transformer-edit-error
    interval: 15m
    description: Task Transformer edit command errors
    hostname: garage.rcmd.space
    warningThreshold: "3"
    criticalThreshold: "5"
    flowOperator: upwards
    suppressedBy:
      - task-transformer
    notify:
      - gotify
      - telegram
      - alert_fatigue
  - name: task_transformer_sync
    plugin: check_redis_key
    option: task-transformer-sync-error
    interval: 15m
    description: Task Transformer sync status
    hostname: garage.rcmd.space
    warningThreshold: "3"
    criticalThreshold: "5"
    flowOperator: upwards
    suppressedBy:
      - task-transformer
    notify:
      - gotify
      - telegram
      - alert_fatigue
  - name: task_transformer_update_due
    plugin: check_redis_key
    option: task-transformer-update-due
    interval: 15m
    description: Task Transformer, updating due date of kanboard cards
    hostname: garage.rcmd.space
    warningThreshold: "3"
    criticalThreshold: "5"
    flowOperator: upwards
    notify:
      - gotify
      - telegram
      - alert_fatigue
  - name: task_transformer_online
    plugin: check_redis_timestamp
    option: task-transformer-sync-timestamp
    interval: 5m
    description: Task Transformer operational status
    hostname: garage.rcmd.space
    warningThreshold: "301"
    criticalThreshold: "500"
    flowOperator: upwards
    suppressedBy:
      - task-transformer
    notify:
      - gotify
      - telegram
      - alert_fatigue
