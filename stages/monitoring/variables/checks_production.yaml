items:
  - name: garage_provisioning
    plugin: check_device_provisioning
    option: ""
    interval: 5m
    description: Checking provisioning status of Garage
    notify:
      - telegram
      - alert_fatigue
  - name: storage_disk_health
    plugin: check_promql
    option: 'smartctl_device_smart_status == 0'
    warningThreshold: '1'
    criticalThreshold: '2'
    interval: 1m
    description: 'Snapraid disks health'
    hostname: garage.rcmd.space
    timeoutSec: 120
    notify:
      - telegram
      - gotify
      - alert_fatigue
  - name: storage_disk_temperature
    plugin: check_promql
    option: 'smartctl_device_temperature > 55'
    warningThreshold: '1'
    criticalThreshold: '3'
    interval: 1m
    description: 'Snapraid disks temperature'
    hostname: garage.rcmd.space
    timeoutSec: 120
    notify:
      - telegram
      - gotify
      - alert_fatigue
  - name: prod_syncthing_service
    plugin: check_systemd_service
    option: syncthing@syncthing.service
    interval: 1m
    description: 'Syncthing: production (systemd service)'
    hostname: garage.rcmd.space
    timeoutSec: 120
    notify:
      - telegram
      - gotify
      - alert_fatigue
  - name: prod_firewalld
    plugin: check_systemd_service
    option: firewalld.service
    interval: 1m
    description: 'Firewalld: production (systemd service)'
    hostname: garage.rcmd.space
    timeoutSec: 120
    notify:
      - telegram
      - gotify
      - alert_fatigue
  - name: prod_iacd
    plugin: check_systemd_service
    option: iacd.service
    interval: 1m
    description: 'IACD: production (systemd service)'
    hostname: garage.rcmd.space
    timeoutSec: 120
    notify:
      - telegram
      - alert_fatigue
  - name: prod_syncthing
    plugin: check_http_success_rate
    warningThreshold: "99"
    criticalThreshold: "97"
    flowOperator: downwards
    option: http://127.0.0.1:8384/rest/noauth/health
    interval: 1m
    description: 'Syncthing: production'
    hostname: garage.rcmd.space
    notify:
      - telegram
      - gotify
      - alert_fatigue
    suppressedBy:
      - prod_syncthing_service
  - name: dav_https
    plugin: check_https_certificate
    option: dav.rcmd.space
    interval: 10m
    description: Radicale SSL certificate
    hostname: garage.rcmd.space
    notify:
      - gotify
      - alert_fatigue
  - name: check_vcfb_updates
    plugin: check_website_diff
    option: https://vcfb.de
    interval: 12h
    description: Checking VCFB exhibitions for 2024
    hostname: garage.rcmd.space
    notify:
      - telegram
      - gotify
      - alert_fatigue
  - name: provisioning
    plugin: check_file
    option: /etc/default/earlystageconfigs
    interval: 15s
    description: Provisioning file
    hostname: garage.rcmd.space
    warningThreshold: "10"
    criticalThreshold: "5"
    flowOperator: downwards
    notify:
      - gotify
      - telegram
      - alert_fatigue
  - name: traccar
    plugin: check_traccar_logs
    option: ""
    interval: 15s
    description: Traccar location tracker
    hostname: garage.rcmd.space
    criticalThreshold: "1814000"
    flowOperator: upwards
    notify:
      - telegram
  - name: webdav_filesystem
    plugin: check_file
    option: /var/storage/wastebox/tiredsysadmin.cc/podcasts/JMGODIER.xml
    interval: 15s
    description: Enсrypted webdav mount
    hostname: garage.rcmd.space
    suppressedBy:
      - gocryptfs_config
    notify:
      - gotify
      - alert_fatigue
  - name: site_https
    plugin: check_https_certificate
    option: rcmd.space
    interval: 10m
    description: Main Website SSL certificate
    hostname: garage.rcmd.space
    notify:
      - gotify
      - alert_fatigue
  - name: blog_https
    plugin: check_https_certificate
    option: tiredsysadmin.cc
    interval: 10m
    description: Blog Website SSL certificate
    hostname: garage.rcmd.space
    notify:
      - gotify
      - alert_fatigue
  - name: chatserver
    plugin: check_http_success_rate
    warningThreshold: "99"
    criticalThreshold: "97"
    flowOperator: downwards
    option: https://382578846.site/#/status
    interval: 1m
    description: 'Databag online status'
    hostname: 382578846.site
    notify:
      - telegram
      - gotify
      - alert_fatigue
  - name: gotify_health
    plugin: check_http_success_rate
    warningThreshold: "99"
    criticalThreshold: "97"
    flowOperator: downwards
    option: https://notifications.rcmd.space/health
    interval: 1m
    description: 'Gotify online status'
    hostname: notifications.rcmd.space
    notify:
      - telegram
      - alert_fatigue
  - name: task_transformer
    plugin: check_http_success_rate
    warningThreshold: "99"
    criticalThreshold: "97"
    flowOperator: downwards
    option: http://int.rcmd.space:30071/healthcheck
    interval: 1m
    description: 'VTODO + VEVENT + Kanboard sync service'
    hostname: garage.rcmd.space
    notify:
      - telegram
      - gotify
      - alert_fatigue
