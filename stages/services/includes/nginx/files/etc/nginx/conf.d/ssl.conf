# ----------------------------------------------------------------------
# Best Practice TLS Configuration Baseline (2026)
# Save as: /etc/nginx/snippets/tls-best-practices.conf
# ----------------------------------------------------------------------

# 1. Protocols & Ciphers
# Drop TLS 1.0 and 1.1 entirely. Explicitly allow TLS 1.2 and 1.3.
ssl_protocols TLSv1.2 TLSv1.3;

# Strict TLS 1.2 Ciphers (AEAD only; ECDHE for forward secrecy)
# Note: TLS 1.3 ciphers are managed automatically by OpenSSL
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

# Allow client preference for negotiating TLS 1.2 ciphers.
# Modern clients naturally prioritize safer, hardware-accelerated ciphers.
ssl_prefer_server_ciphers off;

# 2. Modern Cryptographic Curves
ssl_ecdh_curve X25519:prime256v1:secp384r1;

# 3. Session Management & Performance
# Session timeout and cache configuration (10m = ~40,000 sessions)
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;

# Disable TLS session tickets. While it helps performance, keeping them on
# requires manual encryption key rotation to maintain Forward Secrecy across nodes.
ssl_session_tickets off;

# Optimize buffer size to reduce Time to First Byte (TTFB)
ssl_buffer_size 8k;

# 4. OCSP Stapling (Privacy & Performance)
# Fetches certificate revocation status automatically and staples it to the handshake
ssl_stapling on;
ssl_stapling_verify on;

# Use reliable upstream resolvers for OCSP validation (Cloudflare & Google)
resolver 1.1.1.1 1.0.0.1 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# 5. Core Security Headers
# Enable HTTP Strict Transport Security (HSTS) - 2 years (63072000 seconds)
# WARNING: Only include 'preload' if you are certain all subdomains are secure via HTTPS.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Additional security hardening headers
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
