---
kind: "iac.rcmd.space/command"
id: "services.media.podsync.preflight"
command:
  - createCommand: "test -L /usr/local/bin/youtube-dl || ln -s /opt/virtualenv/bin/yt-dlp /usr/local/bin/youtube-dl"
    deleteCommand: "/bin/true"
  - createCommand: "systemctl stop podsync.service || true"
    deleteCommand: "/bin/true"
---
kind: "iac.rcmd.space/download"
id: "services.media.podsync.binary"
download:
  - url: "https://repo.rcmd.space/binaries/podsync/podsync_linux_arm64"
    mode: "755"
    ownership: "root:root"
    destination: "/usr/local/bin/podsync"
---
kind: "iac.rcmd.space/directory.v2"
id: "services.media.podsync.directories.v2"
directory:
  - name: "/etc/podsync"
    mode: "750"
    ownership: "syncthing:syncthing"
  - name: "/var/log/podsync"
    mode: "750"
    ownership: "syncthing:syncthing"
  - name: "/etc/yt-dlp"
    mode: "750"
    ownership: "syncthing:syncthing"
---
kind: "iac.rcmd.space/file.v2"
id: "services.media.podsync.ytdlp.config"
file:
  - name: "/etc/yt-dlp/config"
    mode: "640"
    ownership: "syncthing:syncthing"
    source: "stages/services/includes/media/files/etc/yt-dlp/config"
---
kind: "iac.rcmd.space/systemd"
id: "services.media.podsync.systemd"
service:
  - name: "podsync"
    description: "A simple media sync tool for podcasts and YouTube channels."
    type: "simple"
    execStart: "/usr/local/bin/podsync --config=/etc/podsync/podsync.toml"
    user: "syncthing"
    restart: "always"
    wantedBy: "multi-user.target"
